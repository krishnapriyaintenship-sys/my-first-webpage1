<!DOCTYPE html>
<html>
<head>
<title>Multiplication Table</title>

<style>
    body {
        font-family: Arial;
        text-align: center;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .box {
        background: white;
        padding: 25px;
        border-radius: 15px;
        width: 300px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    input, button {
        padding: 10px;
        margin-top: 10px;
        width: 90%;
        font-size: 16px;
    }

    button {
        background: #007bff;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 8px;
    }

    button:hover {
        background: #0056b3;
    }

    #result {
        margin-top: 15px;
        text-align: left;
    }
</style>
</head>

<body>

<div class="box">
    <h2>Multiplication Table</h2>

    <input type="number" id="num" placeholder="Enter a number">
    <button onclick="generateTable()">Generate</button>

    <div id="result"></div>
</div>

<script>
function generateTable() {
    let num = document.getElementById("num").value;
    let result = document.getElementById("result");

    result.innerHTML = "";

    if (num === "") {
        result.innerHTML = "Please enter a number";
        return;
    }

    for (let i = 1; i <= 10; i++) {
        result.innerHTML += num + " × " + i + " = " + (num * i) + "<br>";
    }
}
</script>

</body>
</html>
